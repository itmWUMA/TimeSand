name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "SemVer version number without v prefix (e.g., 1.0.0, 0.2.0-beta.1)"
        required: true
        type: string
      release_type:
        description: "Release type"
        required: true
        type: choice
        options:
          - release
          - pre-release
        default: release

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate SemVer format
        run: |
          VERSION="${{ inputs.version }}"
          if [[ ! "$VERSION" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[a-zA-Z0-9.]+)?$ ]]; then
            echo "::error::Invalid version format: '$VERSION'. Must be valid SemVer (e.g., 1.0.0, 0.2.0-beta.1)"
            exit 1
          fi
          echo "Version '$VERSION' is valid SemVer"

      - name: Check tag uniqueness
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/v${{ inputs.version }}$"; then
            echo "::error::Tag 'v${{ inputs.version }}' already exists. Choose a different version."
            exit 1
          fi
          echo "Tag 'v${{ inputs.version }}' is available"

  test-frontend:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: cd frontend && bun install --frozen-lockfile

      - name: Run tests
        run: cd frontend && bun run test

  test-backend:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: cd backend && uv sync

      - name: Run tests
        run: cd backend && uv run pytest

  docker-verify:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Docker build
        run: docker build --build-arg IMAGE_REGISTRY="" .

  release:
    runs-on: ubuntu-latest
    needs: [test-frontend, test-backend, docker-verify]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update frontend version
        run: |
          cd frontend
          jq --arg v "${{ inputs.version }}" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Update backend version
        run: |
          sed -i 's/^version = ".*"/version = "${{ inputs.version }}"/' backend/pyproject.toml

      - name: Commit version bump
        run: |
          git add frontend/package.json backend/pyproject.toml
          if git diff --cached --quiet; then
            echo "Version already set to ${{ inputs.version }}, skipping commit"
          else
            git commit -m "chore: bump version to ${{ inputs.version }}"
          fi

      - name: Create tag
        run: git tag -a "v${{ inputs.version }}" -m "v${{ inputs.version }}"

      - name: Push commit and tag
        run: git push origin main --follow-tags

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ inputs.release_type }}" = "pre-release" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --generate-notes \
            $PRERELEASE_FLAG
